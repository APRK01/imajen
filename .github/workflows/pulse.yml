name: NEONAUT ULTRA-PULSE

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes [Nuclear Density]
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Ultra-Pulse Engine
        run: npx tsx scripts/ultra-pulse.ts
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SILICON_FLOW_KEY: ${{ secrets.SILICON_FLOW_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GH_TOKEN: ${{ secrets.G_TOKEN }} # MASTER KEY for Cloud Vault Push

      - name: Self-Trigger Next Pulse (Infinite Engine)
        if: always()
        run: |
          echo "🛰️ CYCLE COMPLETE: Queuing next discovery pulse..."
          sleep 60
          gh workflow run "NEONAUT ULTRA-PULSE" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.G_TOKEN }} # MASTER KEY for Self-Trigger
